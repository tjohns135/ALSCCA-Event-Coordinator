<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cone Ninja</title>

    <!-- Open Graph -->
    <meta property="og:title" content="Cone Ninja — Track Designer" />
    <meta property="og:description" content="Every cone spared is honor earned" />
    <meta property="og:image" content="https://cone.ninja/cone-ninja-logo.png" />
    <meta property="og:url" content="https://cone.ninja/autox-track-designer" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cone Ninja" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="stylesheet" href="../shared/variables.css" />
    <!-- App CSS -->
    <link rel="stylesheet" href="css/styles.css" />

<body>
    <div id="root"></div>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" src="js/components/Toolbar.js"></script>

    <script type="text/babel" src="js/components/MapView.js"></script>

    <script type="text/babel" src="js/app.js"></script>
